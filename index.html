<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Collision Laboratory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes highlight { from { background-color: #312e81; } to { background-color: transparent; } }
        .new-step { animation: highlight 1.5s ease-out; }
        sub { font-size: 0.75em; }
        .math-font { font-family: 'Times New Roman', Times, serif; }
        .vec { position: relative; display: inline-block; }
        .vec::after { content: '→'; position: absolute; top: -0.3em; left: 0; width: 100%; text-align: center; font-size: 0.6em; transform: scaleX(0.8); }
        
        /* --- LICENCIA Y CONTADOR --- */
        .licencia-bloque { 
            position: absolute; 
            bottom: 5px; 
            left: 0; 
            width: 100%; 
            color: #64748b; 
            font-size: 11px; 
            text-align: center; 
            z-index: 150; 
            line-height: 1.8; 
        }
        .licencia-bloque a { color: #0284c7; text-decoration: none; font-weight: bold; }
        .licencia-bloque a:hover { text-decoration: underline; }
        .badge-container { margin-bottom: 2px; display: flex; justify-content: center; }
    </style>
</head>
<body class="bg-slate-100 h-screen w-full flex flex-col p-4 font-sans text-slate-800 overflow-hidden">

    <header class="mb-4 flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
        <div class="flex items-center gap-4">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 3v15H3V3h15Z"/><path d="M3 18h18"/><path d="M18 8h3"/><path d="M18 13h3"/></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-900 uppercase tracking-tighter">Dynamic Collision Laboratory</h1>
            </div>
        </div>
        <div class="flex gap-2">
            <select id="type-select" class="bg-slate-100 border-slate-200 rounded-lg px-3 py-2 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="elastic">Elastic Collision</option>
                <option value="inelastic">Inelastic Collision</option>
            </select>
            <button id="btn-generate" class="bg-slate-900 hover:bg-slate-800 text-white px-6 py-2 rounded-lg text-sm font-bold transition-all shadow-lg active:scale-95">
                NEW EXERCISE
            </button>
        </div>
    </header>

    <div class="flex flex-1 gap-4 overflow-hidden">
        
        <!-- PANEL IZQUIERDO -->
        <aside class="w-1/4 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col">
            <div class="p-3 border-b border-slate-100 bg-slate-50 rounded-t-xl flex justify-between items-center">
                <h2 class="font-black text-slate-400 uppercase text-xs tracking-widest">Problem Data</h2>
            </div>
            <div id="data-panel" class="p-3 space-y-3 overflow-y-auto flex-1 custom-scroll text-base leading-tight text-slate-600"></div>
            <div class="p-4 bg-slate-50 rounded-b-xl border-t border-slate-100 space-y-2">
                <button id="btn-play" disabled class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-400 disabled:cursor-not-allowed text-white py-3 rounded-xl font-black text-sm uppercase tracking-widest shadow-md transition-all">
                    ▶ Simulate Collision
                </button>
                <button id="btn-next-step" class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white py-3 rounded-xl font-black text-sm uppercase tracking-widest shadow-md transition-all">
                    Step 1. Register data
                </button>
            </div>
        </aside>

        <!-- CANVAS CENTRAL -->
        <main id="canvas-container" class="flex-1 bg-white rounded-xl border border-slate-200 flex flex-col relative overflow-hidden shadow-inner">
            
            <canvas id="mainCanvas" class="w-full h-full"></canvas>

            <!-- Bloque de Licencia y Contador (En la base del Canvas) -->
            <div class="licencia-bloque">
                <div class="badge-container">
                    <img src="https://visitor-badge.laobi.icu/badge?page_id=EAG1964.phychem.lab&left_text=Visits&left_color=gray&right_color=blue" alt="Visits" style="display: inline-block;">
                </div>
                <p style="margin: 0;">
                    Author: <strong>EAG1964</strong> | 2026 | 
                    <a href="https://EAG1964.github.io/">Main Panel</a> | 
                    <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en" target="_blank">CC BY-NC-SA 4.0 License</a>
                </p>
            </div>
        </main>

        <!-- PANEL DERECHO -->
        <aside class="w-1/3 bg-slate-900 text-slate-300 rounded-xl shadow-2xl flex flex-col border border-slate-800">
            <div class="p-4 border-b border-slate-800 bg-slate-950 rounded-t-xl flex justify-between items-center">
                <h2 class="font-bold text-indigo-400 uppercase text-xs tracking-widest">Algebraic Calculations</h2>
            </div>
            <div id="algebra-panel" class="p-5 overflow-y-auto custom-scroll space-y-6 flex-1"></div>
        </aside>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const algebraPanel = document.getElementById('algebra-panel');
        const dataPanel = document.getElementById('data-panel');
        const btnNext = document.getElementById('btn-next-step');
        const btnPlay = document.getElementById('btn-play');
        const btnGenerate = document.getElementById('btn-generate');
        const typeSelect = document.getElementById('type-select');

        let currentStep = 0;
        let p = null;
        let animationId = null;
        let isSimulating = false;
        let collisionOccurred = false;

        let particles = {
            a: { x: 0, y: 0, vx: 0, vy: 0, r: 15, color: "#ef4444", label: "1" },
            b: { x: 0, y: 0, vx: 0, vy: 0, r: 20, color: "#3b82f6", label: "2" }
        };

        function resize() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            if(p) {
                resetParticles();
                drawStatic();
            }
        }

        function rnd(min, max, dec = 2) {
            return parseFloat((Math.random() * (max - min) + min).toFixed(dec));
        }

        function toDeg(rad) {
            return (rad * 180 / Math.PI).toFixed(1);
        }

        function generate() {
            cancelAnimationFrame(animationId);
            isSimulating = false;
            collisionOccurred = false;
            
            const selectedType = typeSelect.value;
            let type = selectedType;
            
            // Si elige "Choque Elástico", elegimos aleatoriamente una de las 5 variantes
            if (selectedType === 'elastic') {
                const subTypes = ['base', 'forense', 'angulos', 'masa', 'masa_comp'];
                type = subTypes[Math.floor(Math.random() * subTypes.length)];
            }
            
            const m1 = rnd(1.5, 4); 
            const m2 = rnd(2, 6);
            const v1 = rnd(4, 7);
            const v2 = rnd(2, 5);
            
            // Ángulos iniciales ampliados al máximo
            const a1 = rnd(-85, 85, 1);
            const a2 = rnd(95, 265, 1);

            const rad1 = a1 * Math.PI / 180;
            const rad2 = a2 * Math.PI / 180;

            const v1x = v1 * Math.cos(rad1);
            const v1y = v1 * Math.sin(rad1);
            const v2x = v2 * Math.cos(rad2);
            const v2y = v2 * Math.sin(rad2);

            const ptx = (m1 * v1x) + (m2 * v2x);
            const pty = (m1 * v1y) + (m2 * v2y);

            let v1f, a1f, v1fx, v1fy, v2fx, v2fy, v2f, a2f;

            if(type === 'inelastic') {
                v1fx = v2fx = ptx / (m1 + m2);
                v1fy = v2fy = pty / (m1 + m2);
                v1f = v2f = Math.hypot(v1fx, v1fy);
                a1f = a2f = Math.atan2(v1fy, v1fx);
            } else {
                // Choques elásticos: Generar ángulo de salida de partícula 1
                const deg1f = rnd(-175, 175, 1);
                a1f = deg1f * Math.PI / 180; 
                v1f = rnd(v1 * 0.4, v1 * 0.8); 
                v1fx = v1f * Math.cos(a1f);
                v1fy = v1f * Math.sin(a1f);
                
                v2fx = (ptx - m1 * v1fx) / m2;
                v2fy = (pty - m1 * v1fy) / m2;
                v2f = Math.hypot(v2fx, v2fy);
                a2f = Math.atan2(v2fy, v2fx);
            }

            p = { 
                type, m1, m2, v1, v2, a1, a2, rad1, rad2, v1x, v1y, v2x, v2y, 
                ptx, pty, v1fx, v1fy, v2fx, v2fy, v1f, a1f, v2f, a2f
            };

            currentStep = 0;
            btnNext.disabled = false;
            btnNext.textContent = "Step 1. Register data";
            btnPlay.disabled = true;
            algebraPanel.innerHTML = '';
            
            updateDataPanel(); 
            resetParticles();
            drawStatic();
            btnPlay.textContent = "▶ Simulate Collision";
        }

        function updateDataPanel() {
            if (!p) return;
            
            let p1Text = `m<sub>1</sub> = ${p.m1} kg; &nbsp; v<sub>1</sub> = ${p.v1} m/s<br>&theta;<sub>1</sub> = ${p.a1}&deg;`;
            let p2Text = `m<sub>2</sub> = ${p.m2} kg; &nbsp; v<sub>2</sub> = ${p.v2} m/s<br>&theta;<sub>2</sub> = ${p.a2}&deg;`;
            let out1Text = `v'<sub>1</sub> = ${p.v1f.toFixed(2)} m/s; &nbsp; &theta;'<sub>1</sub> = ${toDeg(p.a1f)}&deg;`;
            let out2Text = `v'<sub>2</sub> = ${p.v2f.toFixed(2)} m/s; &nbsp; &theta;'<sub>2</sub> = ${toDeg(p.a2f)}&deg;`;
            
            let challengeText = "";

            // Ocultar datos y configurar título según el modo
            if (p.type === 'forense') {
                p2Text = `m<sub>2</sub> = ${p.m2} kg; &nbsp; v<sub>2</sub> = <b>?</b><br>&theta;<sub>2</sub> = <b>?</b>`;
                challengeText = "CHALLENGE: Find Input Vector (P2)";
            } else if (p.type === 'angulos') {
                out1Text = `v'<sub>1</sub> = <b>?</b> ; &nbsp; &theta;'<sub>1</sub> = ${toDeg(p.a1f)}&deg;`;
                out2Text = `v'<sub>2</sub> = <b>?</b> ; &nbsp; &theta;'<sub>2</sub> = ${toDeg(p.a2f)}&deg;`;
                challengeText = "CHALLENGE: Find Final Velocities";
            } else if (p.type === 'masa') {
                p2Text = `m<sub>2</sub> = <b>?</b> ; &nbsp; v<sub>2</sub> = ${p.v2} m/s<br>&theta;<sub>2</sub> = ${p.a2}&deg;`;
                challengeText = "CHALLENGE: Find Mass (P2)";
            } else if (p.type === 'masa_comp') {
                p2Text = `m<sub>2</sub> = <b>?</b> ; &nbsp; v<sub>2</sub> = ${p.v2} m/s<br>&theta;<sub>2</sub> = ${p.a2}&deg;`;
                out2Text = `v'<sub>2x</sub> = <b>?</b> ; &nbsp; v'<sub>2y</sub> = ${p.v2fy.toFixed(2)} m/s<br>v'<sub>2</sub> = <b>?</b> ; &nbsp; &theta;'<sub>2</sub> = <b>?</b>`;
                challengeText = "CHALLENGE: Find Mass and X Component (P2)";
            } else if (p.type === 'base') {
                out2Text = `v'<sub>2</sub> = <b>?</b> ; &nbsp; &theta;'<sub>2</sub> = <b>?</b>`;
                challengeText = "CHALLENGE: Find Output Vector (P2)";
            } else {
                challengeText = "CHALLENGE: Find Common Velocity";
            }

            dataPanel.innerHTML = `
                <div class="bg-indigo-50 border border-indigo-200 p-2 rounded-lg shadow-sm text-indigo-800 text-xs font-bold uppercase text-center mb-2">
                    ${challengeText}
                </div>
                <div class="p-3 bg-red-50 border border-red-200 rounded-lg shadow-sm">
                    <p class="font-bold text-red-600 underline uppercase text-sm mb-1">Particle 1 (Initial)</p>
                    ${p1Text}
                </div>
                <div class="p-3 bg-blue-50 border border-blue-200 rounded-lg shadow-sm">
                    <p class="font-bold text-blue-600 underline uppercase text-sm mb-1">Particle 2 (Initial)</p>
                    ${p2Text}
                </div>
                ${p.type === 'inelastic' ? `
                <div class="p-3 bg-slate-100 border border-slate-300 rounded-lg shadow-sm">
                    <p class="font-bold text-slate-700 underline uppercase text-sm mb-1">Collision Type</p>
                    Perfectly Inelastic (Stuck together)
                </div>` : `
                <div class="p-3 bg-amber-50 border border-amber-300 rounded-lg shadow-sm">
                    <p class="font-bold text-amber-700 underline uppercase text-sm mb-1">Output Data</p>
                    <span class="text-red-700">${out1Text}</span><br>
                    <span class="text-blue-700">${out2Text}</span>
                </div>`}
            `;
        }

        function resetParticles() {
            if (!p) return;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            const margin = 40;
            const maxDistance = Math.min(cx, cy) - margin;
            const maxSpeed = Math.max(p.v1, p.v2);
            const arrivalTime = maxDistance / maxSpeed; 

            particles.a.x = cx - (p.v1x * arrivalTime);
            particles.a.y = cy - (-p.v1y * arrivalTime);
            particles.a.vx = p.v1x;
            particles.a.vy = p.v1y;
            particles.a.r = 12 + p.m1 * 2;

            particles.b.x = cx - (p.v2x * arrivalTime);
            particles.b.y = cy - (-p.v2y * arrivalTime);
            particles.b.vx = p.v2x;
            particles.b.vy = p.v2y;
            particles.b.r = 12 + p.m2 * 2;
        }

        function renderStep() {
            if(!p) return;

            if(currentStep === 1) {
                btnNext.textContent = "Step 2. Determine components";
                
                let p1Text = `m<sub>1</sub> = ${p.m1} kg; v<sub>1</sub> = ${p.v1} m/s; &theta;<sub>1</sub> = ${p.a1}&deg;`;
                let p2Text = `m<sub>2</sub> = ${p.m2} kg; v<sub>2</sub> = ${p.v2} m/s; &theta;<sub>2</sub> = ${p.a2}&deg;`;
                let outText = `v'<sub>1</sub> = ${p.v1f.toFixed(2)}; &theta;'<sub>1</sub> = ${toDeg(p.a1f)}&deg; | v'<sub>2</sub> = ${p.v2f.toFixed(2)}; &theta;'<sub>2</sub> = ${toDeg(p.a2f)}&deg;`;
                
                if (p.type === 'forense') p2Text = `m<sub>2</sub> = ${p.m2} kg; v<sub>2</sub> = <b>?</b>; &theta;<sub>2</sub> = <b>?</b>`;
                if (p.type === 'angulos') outText = `v'<sub>1</sub> = <b>?</b>; &theta;'<sub>1</sub> = ${toDeg(p.a1f)}&deg; | v'<sub>2</sub> = <b>?</b>; &theta;'<sub>2</sub> = ${toDeg(p.a2f)}&deg;`;
                if (p.type === 'masa') p2Text = `m<sub>2</sub> = <b>?</b>; v<sub>2</sub> = ${p.v2} m/s; &theta;<sub>2</sub> = ${p.a2}&deg;`;
                if (p.type === 'masa_comp') {
                    p2Text = `m<sub>2</sub> = <b>?</b>; v<sub>2</sub> = ${p.v2} m/s; &theta;<sub>2</sub> = ${p.a2}&deg;`;
                    outText = `v'<sub>1</sub> = ${p.v1f.toFixed(2)}; &theta;'<sub>1</sub> = ${toDeg(p.a1f)}&deg; | v'<sub>2x</sub> = <b>?</b>; v'<sub>2y</sub> = ${p.v2fy.toFixed(2)} m/s`;
                }
                if (p.type === 'base') outText = `v'<sub>1</sub> = ${p.v1f.toFixed(2)}; &theta;'<sub>1</sub> = ${toDeg(p.a1f)}&deg; | v'<sub>2</sub> = <b>?</b>; &theta;'<sub>2</sub> = <b>?</b>`;

                let datosHtml = `
                    <div class="math-font">
                        ${p1Text}<br>${p2Text}<br>
                        ${p.type === 'inelastic' ? `Collision type: Inelastic` : outText}
                    </div>`;
                addAlgebra("STEP 1: DATA REGISTRATION", datosHtml);
            }

            if(currentStep === 2) {
                btnNext.textContent = "Step 3. Momentum Conservation";
                
                let v1x = `v<sub>1</sub> &middot; cos(${p.a1}&deg;) = <b>${p.v1x.toFixed(3)}</b>`;
                let v1y = `v<sub>1</sub> &middot; sin(${p.a1}&deg;) = <b>${p.v1y.toFixed(3)}</b>`;
                let v2x = `v<sub>2</sub> &middot; cos(${p.a2}&deg;) = <b>${p.v2x.toFixed(3)}</b>`;
                let v2y = `v<sub>2</sub> &middot; sin(${p.a2}&deg;) = <b>${p.v2y.toFixed(3)}</b>`;
                let v1fx = `v'<sub>1</sub> &middot; cos(${toDeg(p.a1f)}&deg;) = <b>${p.v1fx.toFixed(3)}</b>`;
                let v1fy = `v'<sub>1</sub> &middot; sin(${toDeg(p.a1f)}&deg;) = <b>${p.v1fy.toFixed(3)}</b>`;
                let v2fx = `v'<sub>2</sub> &middot; cos(${toDeg(p.a2f)}&deg;) = <b>${p.v2fx.toFixed(3)}</b>`;
                let v2fy = `v'<sub>2</sub> &middot; sin(${toDeg(p.a2f)}&deg;) = <b>${p.v2fy.toFixed(3)}</b>`;

                if(p.type === 'forense') { v2x = `<b>?</b> (Unknown)`; v2y = `<b>?</b> (Unknown)`; }
                if(p.type === 'angulos') { 
                    v1fx = `v'<sub>1</sub> &middot; cos(${toDeg(p.a1f)}&deg;)`; v1fy = `v'<sub>1</sub> &middot; sin(${toDeg(p.a1f)}&deg;)`;
                    v2fx = `v'<sub>2</sub> &middot; cos(${toDeg(p.a2f)}&deg;)`; v2fy = `v'<sub>2</sub> &middot; sin(${toDeg(p.a2f)}&deg;)`;
                }
                if(p.type === 'masa_comp') { v2fx = `<b>?</b> (Unknown)`; }
                if(p.type === 'base') { v2fx = `<b>?</b> (Unknown)`; v2fy = `<b>?</b> (Unknown)`; }

                const mathStep = `
                    <div class="space-y-4 math-font">
                        <div>
                            <p class="text-indigo-400 font-bold mb-1 underline text-sm">INITIAL:</p>
                            v<sub>1x</sub> = ${v1x}<br>v<sub>1y</sub> = ${v1y}<br>
                            v<sub>2x</sub> = ${v2x}<br>v<sub>2y</sub> = ${v2y}
                        </div>
                        ${p.type !== 'inelastic' ? `
                        <div class="pt-2 border-t border-slate-700">
                            <p class="text-amber-400 font-bold mb-1 underline text-sm">FINAL:</p>
                            v'<sub>1x</sub> = ${v1fx}<br>v'<sub>1y</sub> = ${v1fy}<br>
                            v'<sub>2x</sub> = ${v2fx}<br>v'<sub>2y</sub> = ${v2fy}
                        </div>` : ''}
                    </div>
                `;
                addAlgebra("STEP 2: VECTOR COMPONENTS", mathStep);
            }

            if(currentStep === 3) {
                btnNext.textContent = "Step 4. Resolution of Unknowns";
                
                let eqVectorial = p.type === 'inelastic' 
                    ? `m<sub>1</sub><span class="vec">v</span><sub>1</sub> + m<sub>2</sub><span class="vec">v</span><sub>2</sub> = (m<sub>1</sub> + m<sub>2</sub>)<span class="vec">v</span>'`
                    : `m<sub>1</sub><span class="vec">v</span><sub>1</sub> + m<sub>2</sub><span class="vec">v</span><sub>2</sub> = m<sub>1</sub><span class="vec">v</span>'<sub>1</sub> + m<sub>2</sub><span class="vec">v</span>'<sub>2</sub>`;

                let eqX = "", eqY = "";
                
                if (p.type === 'base') {
                    eqX = `(${p.m1} &middot; ${p.v1x.toFixed(2)}) + (${p.m2} &middot; ${p.v2x.toFixed(2)}) = (${p.m1} &middot; ${p.v1fx.toFixed(2)}) + ${p.m2}v'<sub>2x</sub><br><b>${p.ptx.toFixed(2)} = ${(p.m1 * p.v1fx).toFixed(2)} + ${p.m2}v'<sub>2x</sub></b>`;
                    eqY = `(${p.m1} &middot; ${p.v1y.toFixed(2)}) + (${p.m2} &middot; ${p.v2y.toFixed(2)}) = (${p.m1} &middot; ${p.v1fy.toFixed(2)}) + ${p.m2}v'<sub>2y</sub><br><b>${p.pty.toFixed(2)} = ${(p.m1 * p.v1fy).toFixed(2)} + ${p.m2}v'<sub>2y</sub></b>`;
                } else if (p.type === 'forense') {
                    let ptxFinal = p.m1 * p.v1fx + p.m2 * p.v2fx;
                    let ptyFinal = p.m1 * p.v1fy + p.m2 * p.v2fy;
                    eqX = `(${p.m1} &middot; ${p.v1x.toFixed(2)}) + ${p.m2}v<sub>2x</sub> = (${p.m1} &middot; ${p.v1fx.toFixed(2)}) + (${p.m2} &middot; ${p.v2fx.toFixed(2)})<br><b>${(p.m1 * p.v1x).toFixed(2)} + ${p.m2}v<sub>2x</sub> = ${ptxFinal.toFixed(2)}</b>`;
                    eqY = `(${p.m1} &middot; ${p.v1y.toFixed(2)}) + ${p.m2}v<sub>2y</sub> = (${p.m1} &middot; ${p.v1fy.toFixed(2)}) + (${p.m2} &middot; ${p.v2fy.toFixed(2)})<br><b>${(p.m1 * p.v1y).toFixed(2)} + ${p.m2}v<sub>2y</sub> = ${ptyFinal.toFixed(2)}</b>`;
                } else if (p.type === 'angulos') {
                    eqX = `<b>${p.ptx.toFixed(2)}</b> = (${p.m1} &middot; cos(${toDeg(p.a1f)}&deg;))v'<sub>1</sub> + (${p.m2} &middot; cos(${toDeg(p.a2f)}&deg;))v'<sub>2</sub><br>
                           ${p.ptx.toFixed(2)} = ${(p.m1 * Math.cos(p.a1f)).toFixed(3)}v'<sub>1</sub> + ${(p.m2 * Math.cos(p.a2f)).toFixed(3)}v'<sub>2</sub>`;
                    eqY = `<b>${p.pty.toFixed(2)}</b> = (${p.m1} &middot; sin(${toDeg(p.a1f)}&deg;))v'<sub>1</sub> + (${p.m2} &middot; sin(${toDeg(p.a2f)}&deg;))v'<sub>2</sub><br>
                           ${p.pty.toFixed(2)} = ${(p.m1 * Math.sin(p.a1f)).toFixed(3)}v'<sub>1</sub> + ${(p.m2 * Math.sin(p.a2f)).toFixed(3)}v'<sub>2</sub>`;
                } else if (p.type === 'masa') {
                    eqX = `(${p.m1} &middot; ${p.v1x.toFixed(2)}) + m<sub>2</sub>(${p.v2x.toFixed(2)}) = (${p.m1} &middot; ${p.v1fx.toFixed(2)}) + m<sub>2</sub>(${p.v2fx.toFixed(2)})<br><b>${(p.m1*p.v1x).toFixed(2)} + ${p.v2x.toFixed(2)}m<sub>2</sub> = ${(p.m1*p.v1fx).toFixed(2)} + ${p.v2fx.toFixed(2)}m<sub>2</sub></b>`;
                    eqY = `(${p.m1} &middot; ${p.v1y.toFixed(2)}) + m<sub>2</sub>(${p.v2y.toFixed(2)}) = (${p.m1} &middot; ${p.v1fy.toFixed(2)}) + m<sub>2</sub>(${p.v2fy.toFixed(2)})`;
                } else if (p.type === 'masa_comp') {
                    eqX = `(${p.m1} &middot; ${p.v1x.toFixed(2)}) + m<sub>2</sub>(${p.v2x.toFixed(2)}) = (${p.m1} &middot; ${p.v1fx.toFixed(2)}) + m<sub>2</sub>v'<sub>2x</sub>`;
                    eqY = `(${p.m1} &middot; ${p.v1y.toFixed(2)}) + m<sub>2</sub>(${p.v2y.toFixed(2)}) = (${p.m1} &middot; ${p.v1fy.toFixed(2)}) + m<sub>2</sub>(${p.v2fy.toFixed(2)})`;
                } else if (p.type === 'inelastic') {
                    eqX = `<b>${p.ptx.toFixed(2)} = ${p.m1 + p.m2}v'<sub>x</sub></b>`;
                    eqY = `<b>${p.pty.toFixed(2)} = ${p.m1 + p.m2}v'<sub>y</sub></b>`;
                }

                addAlgebra("STEP 3: SYSTEM OF EQUATIONS", `
                    <div class="math-font">
                        <div class="text-center mb-5 text-indigo-300 font-bold bg-slate-900/50 py-3 rounded">
                            <span class="vec">p</span><sub>initial</sub> = <span class="vec">p</span><sub>final</sub><br>
                            ${eqVectorial}
                        </div>
                        <p class="text-indigo-400 font-bold mb-1 underline text-sm">X AXIS:</p>
                        ${eqX}<br><br>
                        <p class="text-indigo-400 font-bold mb-1 underline text-sm">Y AXIS:</p>
                        ${eqY}
                    </div>
                `);
            }

            if(currentStep === 4) {
                btnNext.textContent = "Completed";
                btnNext.disabled = true;
                btnPlay.disabled = false;
                
                let finalHtml = "";
                if(p.type === 'base') {
                    finalHtml = `
                    <div class="math-font">
                        v'<sub>2x</sub> = (${p.ptx.toFixed(2)} - ${(p.m1 * p.v1fx).toFixed(2)}) / ${p.m2} = <b>${p.v2fx.toFixed(2)} m/s</b><br>
                        v'<sub>2y</sub> = (${p.pty.toFixed(2)} - ${(p.m1 * p.v1fy).toFixed(2)}) / ${p.m2} = <b>${p.v2fy.toFixed(2)} m/s</b><br><br>
                        <span class="text-indigo-400 font-bold">v'<sub>2</sub> = &radic;(v'<sub>2x</sub>&sup2; + v'<sub>2y</sub>&sup2;) = ${p.v2f.toFixed(2)} m/s</span><br>
                        <span class="text-indigo-400 font-bold">&theta;'<sub>2</sub> = arctan(v'<sub>2y</sub> / v'<sub>2x</sub>) = ${toDeg(p.a2f)}&deg;</span>
                    </div>`;
                } else if(p.type === 'forense') {
                    let ptxFinal = p.m1 * p.v1fx + p.m2 * p.v2fx;
                    let ptyFinal = p.m1 * p.v1fy + p.m2 * p.v2fy;
                    finalHtml = `
                    <div class="math-font text-emerald-400">
                        v<sub>2x</sub> = (${ptxFinal.toFixed(2)} - ${(p.m1 * p.v1x).toFixed(2)}) / ${p.m2} = <b>${p.v2x.toFixed(2)} m/s</b><br>
                        v<sub>2y</sub> = (${ptyFinal.toFixed(2)} - ${(p.m1 * p.v1y).toFixed(2)}) / ${p.m2} = <b>${p.v2y.toFixed(2)} m/s</b><br><br>
                        <span class="text-emerald-300 font-bold">v<sub>2</sub> = &radic;(v<sub>2x</sub>&sup2; + v<sub>2y</sub>&sup2;) = ${p.v2} m/s</span><br>
                        <span class="text-emerald-300 font-bold">&theta;<sub>2</sub> = arctan(v<sub>2y</sub> / v<sub>2x</sub>) = ${p.a2}&deg;</span>
                    </div>`;
                } else if(p.type === 'angulos') {
                    finalHtml = `
                    <div class="math-font text-amber-400">
                        <p class="mb-2 text-slate-300 text-sm">Solving the 2x2 system (e.g., by substitution):</p>
                        <span class="font-bold text-lg">v'<sub>1</sub> = ${p.v1f.toFixed(2)} m/s</span><br>
                        <span class="font-bold text-lg">v'<sub>2</sub> = ${p.v2f.toFixed(2)} m/s</span>
                    </div>`;
                } else if(p.type === 'masa') {
                    let termX_v2 = p.v2x - p.v2fx;
                    let termX_v1 = p.m1 * p.v1fx - p.m1 * p.v1x;
                    finalHtml = `
                    <div class="math-font text-purple-400">
                        <p class="mb-2 text-slate-300 text-sm">Grouping m<sub>2</sub> on the X axis:</p>
                        m<sub>2</sub> &middot; (${p.v2x.toFixed(2)} - ${p.v2fx.toFixed(2)}) = ${(p.m1 * p.v1fx).toFixed(2)} - ${(p.m1 * p.v1x).toFixed(2)}<br>
                        m<sub>2</sub> &middot; (${termX_v2.toFixed(2)}) = ${termX_v1.toFixed(2)}<br><br>
                        <span class="font-bold text-lg">m<sub>2</sub> = ${p.m2} kg</span>
                    </div>`;
                } else if(p.type === 'masa_comp') {
                    let termY_v2 = p.v2y - p.v2fy;
                    let termY_v1 = p.m1 * p.v1fy - p.m1 * p.v1y;
                    finalHtml = `
                    <div class="math-font text-purple-400">
                        <p class="mb-2 text-slate-300 text-sm">1. Solve for m<sub>2</sub> on the Y Axis:</p>
                        m<sub>2</sub> &middot; (${p.v2y.toFixed(2)} - ${p.v2fy.toFixed(2)}) = ${(p.m1 * p.v1fy).toFixed(2)} - ${(p.m1 * p.v1y).toFixed(2)}<br>
                        m<sub>2</sub> &middot; (${termY_v2.toFixed(2)}) = ${termY_v1.toFixed(2)} &rarr; <span class="font-bold">m<sub>2</sub> = ${p.m2} kg</span><br><br>
                        
                        <p class="mb-2 text-slate-300 text-sm">2. Substitute m<sub>2</sub> into the X Axis:</p>
                        ${(p.m1 * p.v1x).toFixed(2)} + ${p.m2}(${p.v2x.toFixed(2)}) = ${(p.m1 * p.v1fx).toFixed(2)} + ${p.m2}v'<sub>2x</sub><br>
                        v'<sub>2x</sub> = (${p.ptx.toFixed(2)} - ${(p.m1 * p.v1fx).toFixed(2)}) / ${p.m2} = <b>${p.v2fx.toFixed(2)} m/s</b><br><br>
                        
                        <span class="text-emerald-300 font-bold">v'<sub>2</sub> = &radic;(v'<sub>2x</sub>&sup2; + v'<sub>2y</sub>&sup2;) = ${p.v2f.toFixed(2)} m/s</span><br>
                        <span class="text-emerald-300 font-bold">&theta;'<sub>2</sub> = arctan(v'<sub>2y</sub> / v'<sub>2x</sub>) = ${toDeg(p.a2f)}&deg;</span>
                    </div>`;
                } else if(p.type === 'inelastic') {
                    finalHtml = `
                    <div class="math-font text-emerald-400 font-bold">
                        v'<sub>x</sub> = ${p.ptx.toFixed(2)} / ${p.m1 + p.m2} = ${p.v1fx.toFixed(2)} m/s<br>
                        v'<sub>y</sub> = ${p.pty.toFixed(2)} / ${p.m1 + p.m2} = ${p.v1fy.toFixed(2)} m/s<br><br>
                        v'<sub>common</sub> = &radic;(v'<sub>x</sub>&sup2; + v'<sub>y</sub>&sup2;) = ${p.v1f.toFixed(2)} m/s<br>
                        &theta;'<sub>common</sub> = arctan(v'<sub>y</sub> / v'<sub>x</sub>) = ${toDeg(p.a1f)}&deg;
                    </div>`;
                }
                
                addAlgebra("STEP 4: FINAL CALCULATION", finalHtml);
            }
            
            if(!isSimulating) drawStatic();
        }

        function addAlgebra(title, html) {
            const div = document.createElement('div');
            div.className = `border-l-4 border-indigo-500 pl-4 py-4 new-step bg-slate-800/60 rounded-r-lg mb-4`;
            div.innerHTML = `<h3 class="text-indigo-400 font-black text-sm uppercase mb-3 tracking-widest">${title}</h3><div class="text-slate-200 text-base leading-relaxed">${html}</div>`;
            algebraPanel.appendChild(div);
            algebraPanel.scrollTop = algebraPanel.scrollHeight;
        }

        function animate() {
            if(!isSimulating) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            
            const speedFactor = 0.4;

            particles.a.x += particles.a.vx * speedFactor;
            particles.a.y -= particles.a.vy * speedFactor;
            particles.b.x += particles.b.vx * speedFactor;
            particles.b.y -= particles.b.vy * speedFactor;

            const dx = particles.a.x - particles.b.x;
            const dy = particles.a.y - particles.b.y;
            const dist = Math.hypot(dx, dy);

            if(dist < (particles.a.r + particles.b.r) && !collisionOccurred) {
                collisionOccurred = true;
                particles.a.vx = p.v1fx;
                particles.a.vy = p.v1fy;
                particles.b.vx = p.v2fx;
                particles.b.vy = p.v2fy;
            }

            drawVector(particles.a.x, particles.a.y, particles.a.vx, -particles.a.vy, particles.a.color);
            drawVector(particles.b.x, particles.b.y, particles.b.vx, -particles.b.vy, particles.b.color);

            drawBall(particles.a);
            drawBall(particles.b);

            const margin = 100;
            if(particles.a.x < -margin || particles.a.x > canvas.width + margin || 
               particles.b.x < -margin || particles.b.x > canvas.width + margin) {
                isSimulating = false;
                btnPlay.textContent = "↺ Restart Animation";
            } else {
                animationId = requestAnimationFrame(animate);
            }
        }

        function drawBackground() {
            ctx.strokeStyle = "#f1f5f9"; ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=40) {
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
            ctx.strokeStyle = "#cbd5e1";
            ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();
        }

        function drawBall(ball) {
            ctx.save();
            ctx.shadowBlur = 15; ctx.shadowColor = ball.color;
            ctx.fillStyle = ball.color;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            ctx.fillStyle = "white"; ctx.font = "bold 12px sans-serif";
            ctx.textAlign = "center"; ctx.fillText(ball.label, ball.x, ball.y + 5);
        }

        function drawStatic() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            drawBackground();
            if(!p) return;
            resetParticles();
            drawVector(particles.a.x, particles.a.y, p.v1x, -p.v1y, particles.a.color);
            drawVector(particles.b.x, particles.b.y, p.v2x, -p.v2y, particles.b.color);
            drawBall(particles.a);
            drawBall(particles.b);
        }

        function drawVector(x, y, vx, vy, color) {
            const length = Math.hypot(vx, vy);
            if (length < 0.1) return;

            const arrowScale = 15;
            const endX = x + vx * arrowScale;
            const endY = y + vy * arrowScale;

            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 2.5;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            const angle = Math.atan2(vy, vx);
            const headLength = 10;
            const headAngle = Math.PI / 6;

            ctx.beginPath();
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - headLength * Math.cos(angle - headAngle), endY - headLength * Math.sin(angle - headAngle));
            ctx.lineTo(endX - headLength * Math.cos(angle + headAngle), endY - headLength * Math.sin(angle + headAngle));
            ctx.closePath();
            ctx.fill();
        }

        btnPlay.onclick = () => {
            isSimulating = true;
            collisionOccurred = false;
            resetParticles();
            btnPlay.textContent = "↺ Restart";
            animate();
        };

        btnGenerate.onclick = generate;
        btnNext.onclick = () => { 
            if(currentStep < 4) { 
                currentStep++; 
                renderStep(); 
            } 
        };
        
        window.onload = () => {
            resize();
            generate();
        };
        window.onresize = resize;
    </script>
</body>
</html>
